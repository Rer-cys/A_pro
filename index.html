<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #5d4037; --accent-color: #c5a059; --bg-color: #fdfaf6; }
        body { font-family: 'Amiri', serif; background-color: var(--bg-color); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; }
        header { text-align: center; padding: 40px 0; color: var(--main-color); }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--main-color); border-right: 4px solid var(--accent-color); padding-right: 10px; }
        .item-title { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; }
        .content-box { display: none; padding: 15px; background: #faf9f6; font-size: 1.2em; line-height: 2; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>صدقة جارية</h1></header>

    <div class="section">
        <h2>أذكار اليوم والليلة</h2>
        <div id="azkar-sections"></div>
    </div>

    <div class="section">
        <h2>أدعية السنة النبوية (50 دعاء)</h2>
        <div id="dua-sections"></div>
    </div>
</div>

<script>
    // مصفوفة الأذكار (يمكنكِ تعبئتها بـ 30 ذكراً)
    const azkar = ["أذكار الصباح (1)...", "أذكار الصباح (2)...", /* ... ضعي هنا الـ 30 ذكراً */];
    const duas = ["دعاء (1)...", "دعاء (2)...", /* ... ضعي هنا الـ 50 دعاء */];

    function createList(data, targetId) {
        const container = document.getElementById(targetId);
        data.forEach((item, index) => {
            container.innerHTML += `
                <div class="item-title" onclick="toggle(${index}, '${targetId}')">الذكر أو الدعاء رقم ${index + 1} ▼</div>
                <div id="${targetId}-${index}" class="content-box">${item}</div>
            `;
        });
    }

    function toggle(id, prefix) {
        const el = document.getElementById(prefix + '-' + id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    // تشغيل الدالة
    // ملاحظة: استبدلي المصفوفات أعلاه بالقائمة الكاملة للأذكار
</script>
</body>
</html>
